<!DOCTYPE html>
<html>
<head>

<title>LSBF CALLING DASHBOARD</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#05080d url("https://eoimages.gsfc.nasa.gov/images/imagerecords/79000/79765/dnb_land_ocean_ice.2012.3600x1800.jpg") center/cover;
}

.header{
text-align:center;
font-size:34px;
padding:20px;
background:rgba(0,0,0,0.8);
letter-spacing:2px;
}

.best{
text-align:center;
font-size:18px;
padding:12px;
background:#111;
color:#3cff6b;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
}

.clock{
background:rgba(0,0,0,0.75);
padding:20px;
border-radius:12px;
text-align:center;
}

.region{
font-size:16px;
color:#bbb;
}

.time{
font-size:36px;
margin-top:6px;
font-weight:bold;
}

.status{
margin-top:6px;
font-size:13px;
font-weight:bold;
}

.good{color:#3cff6b;}
.ok{color:#ffc857;}
.bad{color:#ff5c5c;}

.newsTicker{
position:fixed;
bottom:0;
width:100%;
background:#000;
color:#3cff6b;
font-size:14px;
padding:8px 0;
overflow:hidden;
white-space:nowrap;
}

#newsContent{
display:inline-block;
padding-left:100%;
animation:scrollNews 90s linear infinite;
}
.newsTicker:hover #newsContent{
animation-play-state:paused;
}

@keyframes scrollNews{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

</style>

</head>

<body>

<div class="header">
LSBF CALLING DASHBOARD
</div>

<div class="best" id="bestMarkets">
Finding best markets to call...
</div>

<div class="best" id="nextMarket">
Next market opening: calculating...
</div>

<div class="grid" id="clocks"></div>

<div class="newsTicker">
<div id="newsContent">
🌍 Education News: Loading latest global education updates...
</div>
</div>

<script>

const zones=[

["UK","Europe/London"],
["Spain / Germany","Europe/Berlin"],
["Nigeria / Ghana / Gambia","Africa/Lagos"],
["Kenya / Uganda / Tanzania / Rwanda","Africa/Nairobi"],
["Zimbabwe / Zambia / Botswana / South Africa","Africa/Harare"],

["UAE","Asia/Dubai"],
["Saudi Arabia / Qatar","Asia/Riyadh"],

["India/Pakistan","Asia/Kolkata"],
["Bangladesh","Asia/Dhaka"],

["Singapore / Malaysia","Asia/Singapore"],
["Thailand / Vietnam","Asia/Bangkok"],

["Hong Kong","Asia/Hong_Kong"],
["Japan / South Korea","Asia/Tokyo"],

["USA East","America/New_York"],
["USA West","America/Los_Angeles"],

["Australia","Australia/Sydney"]

];

const container=document.getElementById("clocks");

zones.forEach((z,i)=>{

let div=document.createElement("div");

div.className="clock";

div.innerHTML=`
<div class="region">${z[0]}</div>
<div class="time" id="t${i}"></div>
<div class="status" id="s${i}"></div>
`;

container.appendChild(div);

});

function getStatus(hour){

if(hour>=11 && hour<=18) return ["GOOD CALL TIME","good"];
if(hour>=7 && hour<11) return ["EARLY","ok"];
if(hour>18 && hour<=21) return ["LATE","ok"];

return ["SLEEPING","bad"];

}

function nextOpening(){

let nextMarket=null;
let smallestDiff=999999999;

zones.forEach(z=>{

let now=new Date().toLocaleString("en-US",{timeZone:z[1]});
let d=new Date(now);

let hour=d.getHours();

if(hour<11){

let open=new Date(d);
open.setHours(11,0,0,0);

let diff=open-d;

if(diff<smallestDiff){

smallestDiff=diff;
nextMarket=z[0];

}

}

});

if(nextMarket){

let minutes=Math.floor(smallestDiff/60000);
let hrs=Math.floor(minutes/60);
minutes=minutes%60;

document.getElementById("nextMarket").innerHTML=
"⏰ NEXT MARKET OPENING → "+nextMarket+" in "+hrs+"h "+minutes+"m";

}else{

document.getElementById("nextMarket").innerHTML=
"All markets currently open";

}

}

function update(){

let best=[];

zones.forEach((z,i)=>{

let now=new Date().toLocaleString("en-US",{timeZone:z[1]});
let d=new Date(now);

let hour=d.getHours();
let time=d.toLocaleTimeString("en-US");

let s=getStatus(hour);

document.getElementById("t"+i).innerHTML=time;

let stat=document.getElementById("s"+i);

stat.innerHTML=s[0];
stat.className="status "+s[1];

if(s[1]=="good") best.push(z[0]);

});

document.getElementById("bestMarkets").innerHTML=
"📞 BEST MARKETS TO CALL NOW → "+(best.length?best.join(" | "):"None");

nextOpening();

}

async function loadEducationNews(){

try{

let feed="https://api.rss2json.com/v1/api.json?rss_url=https://monitor.icef.com/feed/";

let res=await fetch(feed);
let data=await res.json();

let headlines=data.items.slice(0,6).map(n=>n.title);

document.getElementById("newsContent").innerHTML=
"🌍 GLOBAL EDUCATION NEWS → "+headlines.join(" | ");

}
catch(e){

document.getElementById("newsContent").innerHTML=
"🌍 Education News unavailable";

}

}

setInterval(update,1000);
update();

loadEducationNews();
setInterval(loadEducationNews,3600000);

</script>

</body>
</html>
